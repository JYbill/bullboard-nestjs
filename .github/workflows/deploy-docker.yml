name: deploy docker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/bullboard

jobs:
  install-cache:
    name: install cache
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup buildx
        uses: docker/setup-buildx-action@v4

      - name: install cache
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: install
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=install
          cache-to: type=gha,scope=install,mode=max

  lint-format:
    name: lint format
    runs-on: ubuntu-latest
    needs:
      - install-cache

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup buildx
        uses: docker/setup-buildx-action@v4

      - name: lint
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: lint
          platforms: linux/amd64
          push: false
          cache-from: |
            type=gha,scope=lint
            type=gha,scope=install
          cache-to: type=gha,scope=lint,mode=max

      - name: format
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: format
          platforms: linux/amd64
          push: false
          cache-from: |
            type=gha,scope=format
            type=gha,scope=install
          cache-to: type=gha,scope=format,mode=max

  test:
    name: test
    runs-on: ubuntu-latest
    needs:
      - install-cache

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup buildx
        uses: docker/setup-buildx-action@v4

      - name: test
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: test
          platforms: linux/amd64
          push: false
          cache-from: |
            type=gha,scope=test
            type=gha,scope=install
          cache-to: type=gha,scope=test,mode=max

  build-push:
    name: build push
    runs-on: ubuntu-latest
    needs:
      - lint-format
      - test

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup qemu
        uses: docker/setup-qemu-action@v4

      - name: setup buildx
        uses: docker/setup-buildx-action@v4

      - name: login dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value={{branch}}_{{sha}}

      - name: build push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=production
            type=gha,scope=install
          cache-to: type=gha,scope=production,mode=max
